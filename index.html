<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unani Wellness Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  background: url('bg.png') no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
}

/* DARK OVERLAY */
body::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7));
}

/* CARD (DESKTOP) */
.card {
  position: relative;
  z-index: 2;
  width: 85%;
  max-width: 500px;
  padding: 28px 22px;
  text-align: center;

  background: rgba(20,10,5,0.65);
  backdrop-filter: blur(10px);

  border: 1.5px solid rgba(212,175,55,0.6);
  border-radius: 14px;

  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* LOGO */
.logo {
  width: 100%;
  max-width: 160px;
  margin: 0 auto 12px;
}

/* TAGLINE */
.tagline {
  color: #d4af37;
  font-size: 12px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

/* TITLE */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  margin: 8px 0;

  background: linear-gradient(to right, #d4af37, #f5e3a1);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

/* LINE */
.line {
  width: 80px;
  height: 2px;
  background: linear-gradient(to right, transparent, #d4af37, transparent);
  margin: 12px auto;
}

/* SUBTEXT */
.subtitle {
  color: #f5e9c9;
  font-size: 0.9rem;
  margin-bottom: 18px;
}

/* BUTTON */
.btn {
  padding: 8px 20px;
  border-radius: 30px;
  border: 1px solid #d4af37;
  color: #d4af37;
  text-decoration: none;
  font-size: 12px;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 10px;
  color: #c9b37a;
}

/* ================= MOBILE ================= */
@media (max-width: 480px) {

  body {
    padding: 16px; /* 🔥 side spacing */
  }

  .card {
    width: 100%;
    max-width: 340px; /* 🔥 EXACT width like your screenshot */
    margin: auto;
    padding: 22px 16px;
    border-radius: 14px;
  }

  .logo {
    width: 95px;
  }

  .tagline {
    font-size: 9px;
  }

  h1 {
    font-size: 1.6rem;
  }

  .line {
    width: 60px;
  }

  .subtitle {
    font-size: 0.8rem;
  }

  .btn {
    font-size: 11px;
    padding: 7px 16px;
  }

  .footer {
    font-size: 9px;
  }
}

</style>
</head>

<body>

<div class="card">

  <img src="logo.png" class="logo">

  <div class="tagline">THE HEALING TOUCH OF HOLISTIC UNANI</div>

  <h1>COMING SOON</h1>

  <div class="line"></div>

  <div class="subtitle">
    A refined journey into natural healing and holistic wellness
  </div>

  <a href="#" class="btn">Stay Tuned</a>

  <div class="footer">
    Bliss Gx, Station Road, Gerrards Cross, SL9 8EL <br>
    📞 07570 086987 <br>
    ✉ doctor@unani.uk
  </div>

</div>

</body>
</html>
